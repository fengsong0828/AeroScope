<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 样式复用... */
        .search-component { position: relative; margin-right: 15px; }
        .search-box { display: flex; align-items: center; border: 1px solid #cbd5e1; border-radius: 20px; background: white; padding: 5px 12px; }
        .search-input { border: none; outline: none; font-size: 0.9rem; width: 160px; color: #1e293b; }
        #search-dropdown { position: absolute; top: 45px; right: 0; width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; display: none; max-height: 400px; overflow-y: auto; }
        .search-result-item { display: block; padding: 12px; border-bottom: 1px solid #f1f5f9; text-decoration: none; color: #1e293b; }
        .search-result-item:hover { background: #f8fafc; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; padding-bottom: 40px; }
        .footer-col h4 { color: white; margin-bottom: 20px; font-size: 1rem; }
        .footer-col ul li { margin-bottom: 12px; }
        .footer-col a { color: #94a3b8; font-size: 0.9rem; }
        .footer-col a:hover { color: #3b82f6; }
        .social-icons { display: flex; gap: 15px; margin-top: 20px; }
        .social-btn { width: 36px; height: 36px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

        body { background-color: #f8fafc; }
        .detail-container { max-width: 900px; margin: 20px auto 60px; padding: 0 20px; }
        .back-nav { margin-bottom: 15px; }
        .back-btn { display: inline-flex; align-items: center; gap: 5px; color: #64748b; font-size: 0.9rem; font-weight: 500; }
        .back-btn:hover { color: #3b82f6; }
        .article-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; display:flex; flex-direction:column; }
        .article-header { padding: 30px 40px 10px 40px; text-align: center; }
        .article-badges { margin-bottom: 10px; display: flex; justify-content: center; }
        .category-badge { background: #0f172a; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .article-title { font-size: 1.8rem; font-weight: 800; color: #0f172a; line-height: 1.3; margin-bottom: 15px; }
        .meta-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #e2e8f0; border-bottom: 1px solid #f1f5f9; padding: 12px 0; color: #64748b; font-size: 0.85rem; }
        .article-hero-img { width: auto; max-width: 100%; height: auto; max-height: 450px; object-fit: cover; display: block; margin: 20px auto 10px; border-radius: 6px; }
        .article-body { padding: 10px 40px 40px 40px; font-size: 1.05rem; line-height: 1.65; color: #334155; text-align: justify; }
        .article-body h2 { font-size: 1.4rem; border-left: 4px solid #0f172a; padding-left: 10px; margin-top: 1.2em; }
        .article-body p { margin-bottom: 1em; }
        .summary-box { background: #f8fafc; border-left: 4px solid #3b82f6; padding: 15px; margin-bottom: 20px; font-style: italic; color: #475569; }
        
        /* 锁 */
        .locked-content { position: relative; min-height: 300px; overflow: hidden; }
        .locked-blur { filter: blur(5px); user-select: none; opacity: 0.5; }
        .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,1) 80%); }
        .lock-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 1px solid #e2e8f0; width: 80%; max-width: 300px; }
        .lock-btn { display: inline-block; background: #3b82f6; color: white; padding: 8px 20px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: 600; margin-top: 15px; }
        .lock-btn:hover { background: #2563eb; }

        @media (max-width: 768px) { .search-component { display: none; } .footer-grid { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

                <a href="../index.html" class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>AeroScope<span>Insight</span></a>
                <button class="mobile-menu-btn" onclick="toggleMenu()"></button>

                </nav>
                <div class="header-actions">
                    <div class="search-component">
                        <div class="search-box"><span class="search-icon"></span><input type="text" class="search-input" placeholder="搜公司、政策..." id="global-search" onkeyup="performGlobalSearch(this.value)"></div>
                        <div id="search-dropdown"></div>

                        <a href="mailto:contact@aeroscope.cn" class="social-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></a>
                    </div>

                <div class="footer-col"><h4>核心板块</h4><ul><li><a href="news.html">资讯快报</a></li><li><a href="policies.html">政策法规</a></li><li><a href="companies.html">企业数据库</a></li></ul></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://ulfktuvatxyakrdrwxfq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZmt0dXZhdHh5YWtyZHJ3eGZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NDYyMjksImV4cCI6MjA4MDIyMjIyOX0.SBvHgp9HK_Lr5vXCgwu4Ae-Q6hH4dhMx3JSRbLiU0fU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', async function() {
            checkUserLogin();
            const urlParams = new URLSearchParams(window.location.search);
            const reportId = urlParams.get('id');
            const container = document.getElementById('article-main');

            if (!reportId) { container.innerHTML = '<div style="padding:40px; text-align:center;">错误：缺少报告ID</div>'; return; }

            const { data: report, error } = await _supabase.from('deep_reports').select('*').eq('id', reportId).single();

            if (error) { container.innerHTML = '<div style="padding:40px; text-align:center;">报告加载失败或已删除</div>'; return; }

            // 权限检查
            const { data: { session } } = await _supabase.auth.getSession();
            let userTier = 'free';
            if (session) {
                const { data: profile } = await _supabase.from('profiles').select('tier').eq('id', session.user.id).single();
                userTier = profile?.tier || 'free';
            }
            
            const isLocked = report.is_pro_only && (userTier !== 'pro' && userTier !== 'enterprise');

            // Markdown
            let rawContent = report.content || '暂无正文';
            rawContent = rawContent.replace(/\\n/g, '\n');
            const formattedContent = marked.parse(rawContent);
            
            const imgHtml = report.image_url ? `<img src="${report.image_url}" class="article-hero-img" alt="${report.title}">` : '';
            let summaryHtml = report.summary ? `<div class="summary-box"> 核心摘要：${report.summary}</div>` : '';

            let finalBody = '';
            if (isLocked) {
                const teaser = formattedContent.substring(0, 300); 
                finalBody = `
                    <div class="locked-content">
                        <div class="locked-blur">${teaser}...</div>
                        <div class="locked-overlay">
                            <div class="lock-box">
                                <div style="font-size:2rem; margin-bottom:10px;"></div>
                                <h3 style="margin-bottom:10px; color:#1e293b;">Pro 会员专享</h3>
                                <p style="font-size:0.9rem; color:#64748b; margin-bottom:20px;">此报告包含高价值产业数据与分析。</p>
                                <a href="../profile.html" class="lock-btn">升级解锁</a>
                                <div style="margin-top:15px; font-size:0.8rem; color:#94a3b8;">已订阅？ <a href="../login.html" style="color:#3b82f6;">登录</a></div>
                            </div>
                        </div>
                    </div>`;
            } else {
                finalBody = formattedContent;
            }

            container.innerHTML = `
                <div class="article-header">

                    <h1 class="article-title">${report.title}</h1>
                    <div class="meta-row">
                        <div><span>发布日期:</span> ${report.publish_date}</div>
                        <div><span>作者:</span> <strong style="color:#0f172a;">${report.author || '智库专家'}</strong></div>
                    </div>
                </div>
                ${imgHtml}
                <div class="article-body">
                    ${summaryHtml}
                    ${finalBody}
                </div>
            `;
            document.title = `${report.title} | AeroScope`;
        });

        let searchTimeout;
        async function performGlobalSearch(keyword) {
            const dropdown = document.getElementById('search-dropdown');
            if (!keyword || keyword.length < 1) { dropdown.style.display = 'none'; return; }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                dropdown.style.display = 'block';
                dropdown.innerHTML = '<div style="padding:12px; text-align:center; color:#94a3b8;">搜索中...</div>';
                const { data, error } = await _supabase.from('global_search_view').select('*').ilike('title', `%${keyword}%`).limit(5);
                if (error || !data.length) { dropdown.innerHTML = '<div style="padding:12px; text-align:center;">无结果</div>'; return; }
                let html = '';
                data.forEach(item => {
                    let link=`news-detail.html?id=${item.id}`;
                    if(item.type==='report') link=`report-detail.html?id=${item.id}`;
                    html += `<a href="${link}" class="search-result-item">${item.title}</a>`;
                });
                dropdown.innerHTML = html;
            }, 500);
        }
        document.addEventListener('click', (e) => { if(!document.querySelector('.search-component').contains(e.target)) document.getElementById('search-dropdown').style.display='none'; });
        async function checkUserLogin() { const {data:{session}} = await _supabase.auth.getSession(); const btn=document.getElementById('auth-btn'); if(session){btn.innerText=session.user.email.split('@')[0]; btn.onclick=()=>location.href='../profile.html';}}
        function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    </script>
<script src="../js/ai-widget.js"></script>
</body>
</html>
