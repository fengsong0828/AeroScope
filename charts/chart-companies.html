function initWorldMap(){

series:[{type:'map',geoIndex:0,data:data}]
});

});
}

function renderArch(){
var dom=document.getElementById("arch-diagram");if(!dom)return;
var c=["#007AFF","#34C759","#AF52DE","#FF9500"];
var cols=["repeat(5,1fr)","repeat(5,1fr)","repeat(5,1fr)","repeat(4,1fr)"];
var h='<div style="max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:10px;padding:10px">';
for(var i=0;i<layers.length;i++){
var s=layers[i];
h+='<div style="border-radius:10px;border:1.5px solid '+c[i]+';overflow:hidden"><div style="padding:10px 16px 6px;font-weight:800;color:'+c[i]+'">'+s.id+' '+s.n+'</div>';
h+='<div style="display:grid;grid-template-columns:'+cols[i]+';gap:8px;padding:0 10px 10px">';
for(var j=0;j<s.subs.length;j++){
var sub=s.subs[j];
var star=sub.core?'<span style="background:rgba(0,122,255,0.1);color:#007AFF;font-size:0.6rem;padding:1px 5px;border-radius:3px;margin-left:4px"></span>':"";
var chips="";
for(var k=0;k<sub.l3.length;k++)chips+='<span style="padding:2px 6px;border-radius:4px;background:#f9f9f9;font-size:0.7rem;color:#6e6e73;display:inline-block;margin:2px;cursor:pointer" onclick="event.stopPropagation();showArchL3('+i+','+j+','+k+')">'+sub.l3[k].n+'</span>';
h+='<div style="background:#fff;border-radius:8px;border:1px solid #d2d2d7;padding:8px 12px;cursor:pointer" onclick="showArchComp('+i+','+j+')">';
h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px"><span style="font-size:0.7rem;color:#8e8e93;font-family:monospace">'+sub.c+'</span><span style="font-size:0.82rem;font-weight:600;color:#1d1d1f">'+sub.n+'</span>'+star+'</div><div style="margin-top:2px">'+chips+'</div></div>';
}
h+='</div></div>';
}
h+='</div>';dom.innerHTML=h;
}

function showArchComp(si,ci){
var sub=layers[si].subs[ci];var kws=[];
sub.l3.forEach(function(l){kws=kws.concat(l.kw)});
var m=[];
globalCompanyData.forEach(function(c){var t=(c.name+(c.industry_chain||'')+(c.description||'')).toLowerCase();for(var j=0;j<kws.length;j++){if(t.includes(kws[j])){m.push(c);break}}});
document.getElementById('m-title').innerText=sub.c+' '+sub.n+' ('+m.length+'家)';
var h='';m.slice(0,100).forEach(function(c){h+='<a href="../pages/company-detail.html?id='+c.id+'" class="modal-list-item"><span class="item-name">'+c.name+'</span><span>→</span></a>'});
if(m.length===0)h='<div style="padding:20px;text-align:center;color:#aeaeb2">暂无匹配企业</div>';
document.getElementById('m-content').innerHTML=h;document.getElementById('info-modal').style.display='flex';
}

function initGraph(){renderArch()}

function switchTab(t){
document.querySelectorAll('.chart-tab-btn').forEach(function(b,i){b.classList.remove('active');if((t==='world'&&i===0)||(t==='graph'&&i===1))b.classList.add('active')});
document.getElementById('view-world').classList.remove('active');
document.getElementById('view-graph').classList.remove('active');
document.getElementById('view-'+t).classList.add('active');
if(t==='graph')setTimeout(function(){renderArch()},100);
else setTimeout(function(){if(worldChart)worldChart.resize()},100);
}

function closeModal(){document.getElementById('info-modal').style.display='none'}

async function checkLogin(){var d=await _s.auth.getSession();var b=document.getElementById('auth-btn');if(d.data.session){b.innerText=d.data.session.user.email.split('@')[0];b.onclick=function(){location.href='../profile.html'}}}
function toggleMenu(){document.getElementById('navMenu').classList.toggle('active')}
var st;async function performGlobalSearch(k){var dd=document.getElementById('search-dropdown');if(!k||k.length<1){dd.style.display='none';return}clearTimeout(st);st=setTimeout(async function(){dd.style.display='block';var d=await _s.from('global_search_view').select('*').ilike('title','%'+k+'%').limit(5);if(!d.data||!d.data.length){dd.innerHTML='<div style="padding:12px;text-align:center">无结果</div>';return}var h='';d.data.forEach(function(i){var l='#';if(i.type==='company')l='../pages/companies.html';else l='../pages/news-detail.html?id='+i.id;h+='<a href="'+l+'" class="search-result-item">'+i.title+'</a>'});dd.innerHTML=h},500)}
document.addEventListener('click',function(e){if(!document.querySelector('.search-component').contains(e.target))document.getElementById('search-dropdown').style.display='none'});
window.addEventListener('resize',function(){if(worldChart)worldChart.resize()});
</script>
<script src="../js/ai-widget.js"></script>
</body>
</html>
