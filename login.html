<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroScope 通行证</title>
    <style>
        /* === 基础样式 === */
        body { 
            margin: 0; padding: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f1f5f9; 
            height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .auth-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 360px; 
            position: relative;
            z-index: 10;
        }
        
        /* 头部样式 */
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { margin: 0 0 10px; color: #0f172a; font-size: 1.5rem; font-weight: 800; }
        .auth-header p { margin: 0; color: #64748b; font-size: 0.9rem; }
        
        /* 表单样式 */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #334155; }
        input { 
            width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; 
            font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; 
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* 按钮样式 */
        .btn-submit { 
            width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; 
            border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; 
        }
        .btn-submit:hover { background: #2563eb; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

        /* 底部链接 */
        .bottom-links { text-align: center; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .bottom-links a { font-size: 0.85rem; color: #64748b; text-decoration: none; transition: 0.2s; }
        .bottom-links a:hover { color: #3b82f6; }

        /* 消息提示 */
        #msg { margin-top: 15px; text-align: center; font-size: 0.85rem; min-height: 20px; padding: 0 5px; }
        .text-red { color: #ef4444; }
        .text-green { color: #10b981; }
        .text-gray { color: #64748b; }

        /* =========================================
            自定义模态框样式 (Modern UI) 
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); /* 深色半透明背景 */
            backdrop-filter: blur(4px); /* 磨砂玻璃效果 */
            display: none; /* 默认隐藏 */
            align-items: center; justify-content: center;
            z-index: 1000;
            opacity: 0; transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-box {
            background: white; width: 90%; max-width: 320px;
            padding: 24px; border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .modal-overlay.active .modal-box { transform: scale(1); }

        .modal-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .modal-title { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .modal-desc { font-size: 0.9rem; color: #64748b; line-height: 1.5; margin-bottom: 24px; }

        .modal-actions { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-confirm { background: #3b82f6; color: white; }
        .btn-confirm:hover { background: #2563eb; }

    </style>
</head>
<body>

    <!-- 登录卡片 -->
    <div class="auth-card">
        <div class="auth-header">
            <h2>欢迎回来</h2>
            <p>登录 AeroScope 低空经济信息平台</p>
        </div>
        
        <div class="form-group">
            <label>电子邮箱</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <button class="btn-submit" onclick="handleAuth()" id="loginBtn">立即登录</button>
        
        <div id="msg" class="text-gray"></div>
        
        <div class="bottom-links">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <!--  自定义美化弹窗  -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <span class="modal-icon"></span>
            <div class="modal-title">账号不存在</div>
            <div class="modal-desc">我们没有找到该账号，或者密码错误。<br>如果是新朋友，要为您创建账号吗？</div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal(false)">取消</button>
                <button class="modal-btn btn-confirm" onclick="closeModal(true)">立即注册</button>
            </div>
        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ================= 配置区域 =================
        const supabaseUrl = 'https://ulfktuvatxyakrdrwxfq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZmt0dXZhdHh5YWtyZHJ3eGZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NDYyMjksImV4cCI6MjA4MDIyMjIyOX0.SBvHgp9HK_Lr5vXCgwu4Ae-Q6hH4dhMx3JSRbLiU0fU';
        // ===========================================
        
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 全局变量用于存储待注册的凭据
        let pendingEmail = '';
        let pendingPassword = '';

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');
            
            // 1. 基础校验
            if (!email || !password) {
                showMsg('请输入邮箱和密码', 'red');
                return;
            }

            // 2. 锁定按钮
            btn.disabled = true;
            btn.innerText = '验证中...';
            showMsg('正在连接服务器...', 'gray');
            
            try {
                // 3. 尝试登录
                let { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    console.log('登录失败:', error.message);
                    
                    // 恢复按钮以便重试
                    btn.disabled = false;
                    btn.innerText = '立即登录';
                    showMsg('', 'gray');

                    //  核心修改：触发美化弹窗，而不是 confirm() 
                    pendingEmail = email;
                    pendingPassword = password;
                    showModal();
                    
                } else {
                    // 登录成功
                    loginSuccess(btn);
                }
            } catch (err) {
                showMsg('系统错误: ' + err.message, 'red');
                btn.disabled = false;
                btn.innerText = '立即登录';
            }
        }

        // --- 模态框控制逻辑 ---
        function showModal() {
            const modal = document.getElementById('customModal');
            modal.classList.add('active'); // 添加 class 触发 CSS 动画
        }

        function closeModal(isRegister) {
            const modal = document.getElementById('customModal');
            modal.classList.remove('active'); // 移除 class 隐藏
            
            if (isRegister) {
                // 用户点击了“立即注册”
                performRegistration(pendingEmail, pendingPassword);
            } else {
                // 用户点击了“取消”
                showMsg('登录失败，请检查账号密码', 'red');
            }
        }

        // --- 注册逻辑 ---
        async function performRegistration(email, password) {
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerText = '注册中...';
            showMsg('正在为您创建账号...', 'gray');

            const res = await _supabase.auth.signUp({ email, password });
            
            if (res.error) {
                showMsg('注册失败: ' + res.error.message, 'red');
                btn.disabled = false;
                btn.innerText = '立即登录';
            } else {
                // 写入 profile
                if (res.data.user) {
                    await _supabase.from('profiles').insert([{ 
                        id: res.data.user.id, 
                        email: email,
                        username: email.split('@')[0]
                    }]);
                }
                
                showMsg('注册成功！正在进入系统...', 'green');
                setTimeout(() => {
                    window.location.href = 'index.html'; 
                }, 1500);
            }
        }

        // --- 登录成功逻辑 ---
        function loginSuccess(btn) {
            showMsg('登录成功！正在跳转...', 'green');
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 1000);
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.className = `text-${type}`;
        }
    </script>
</body>
</html>
