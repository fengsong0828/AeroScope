<h2>Description</h2>
<div html="" itemprop="content"><div class="description" lang="ZH" load-source="patent-office" mxw-id="PDES404280363">
<invention-title id="tilte76" lang="ZH">地磁耦合发电的单人低空安全飞行器</invention-title>
<disclosure>
<div class="description-paragraph" id="d0" num="0001">本发明创造涉及一种以《地球电磁场耦合发电机》(发明专利申请号：200610078729.6)作为动力源(零燃料、零排放、零污染、零辐射、低噪音)，配上《反重力低空飞行装置》、《太空式单人恒温充气服》、《应急自动迫降伞》、《低空飞行电子控制器》、《卫星定位导航仪》所组成的【地磁耦合发电的单人低空安全飞行器】又称：【电力单人飞行器】。</div>
<div class="description-paragraph" id="d1" num="0002">这种飞行器比地面交通所用的自行车、摩托车、单人电动车等更安全、更方便、更快捷、更舒适！它将是人类社会单人漫游于低空飞行的最安全、最经济、最耐用和最先进的交通工具。</div>
</disclosure>
</div>
</div>
</section></body></html>
